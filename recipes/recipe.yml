---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: flavos-kinoite
# description will be included in the image's metadata
description: Flav's Kinoite spin.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: 44

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: kargs
    kargs:
      - amdgpu.gfxoff=0
      - nvidia-drm.modeset=1
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - initcall_blacklist=simpledrm_platform_driver_init
      - "!amdgpu.dpm=0"
  - type: akmods
    install:
      - v4l2loopback
      - akmod-openrgb.x86_64
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      copr:
        - atim/starship
        - atim/gping
        - scottames/ghostty
    install:
      packages:
        - mc
        - steam-devices
        - openrgb-udev-rules
        - openrgb.x86_64
        - lm_sensors      # For fan speeds and others
        - lm_sensors-libs
        - btop             # aliased as 'top'
        - cool-retro-term
        - duf              # aliased as 'df'
        - jq
        - procs            # aliased as 'ps'
        - gping
        - dua-cli          # aliased as 'du'
        - podman-compose
        - podman-docker
        - podman-tui
        - plocate
        - grc
        - fastfetch
        - ripgrep          # aliased as 'grep'
        - fzf              # fuzzy finder for everything - history, files, processes
        - fd-find          # aliased as 'find'
        - bat              # aliased as 'cat'
        - eza              # aliased as 'ls', 'll', 'lt'
        - zoxide           # aliased as 'cd' (via eval)
        - hyperfine
        - tealdeer         # aliased as 'help'

        # KWin MCP requirements.
        - libei
        - at-spi2-core
        - python3-dbus
        - spectacle
        - wl-clipboard
        - wtype
        - wayland-utils
        - dbus-devel
        - glib2-devel
        - gobject-introspection-devel
        - cairo-gobject-devel
        - cairo-devel
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # Various Python versions.
  - type: dnf
    install:
      packages:
        - python3.13
        - python3.13-devel
        - python3.12
        - python3.12-devel
        - python3.11
        - python3.11-devel
        - python3.10
        - python3.10-devel

  # Godot build requirements.
  - type: dnf
    install:
      packages:
        - scons
        - pkgconfig
        - libX11-devel
        - libXcursor-devel
        - libXrandr-devel
        - libXinerama-devel
        - libXi-devel
        - wayland-devel
        - mesa-libGL-devel
        - mesa-libGLU-devel
        - alsa-lib-devel
        - pulseaudio-libs-devel
        - libudev-devel
        - gcc-c++
        - libstdc++-static
        - libatomic-static
        - mingw64-gcc-c++

  # Guestfs
  - type: dnf
    install:
      packages:
        - guestfs-tools

  # Misc services.
  - type: systemd
    system:
      enabled:
        - podman.socket
        - sshd.service

  - type: default-flatpaks
    configurations:
      - notify: false # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - org.mozilla.firefox
          - com.discordapp.Discord
          - com.github.PintaProject.Pinta
          - com.google.Chrome
          - com.protonvpn.www
          - com.rtosta.zapzap
          - com.slack.Slack
          - com.todoist.Todoist
          - com.valvesoftware.Steam
          - org.gimp.GIMP
          - org.kde.isoimagewriter
          - org.kde.krita
          - md.obsidian.Obsidian
          - io.github.nokse22.Exhibit
          # - org.openrgb.OpenRGB
          # - runtime/org.freedesktop.Platform.ffmpeg-full/x86_64/24.08

      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
